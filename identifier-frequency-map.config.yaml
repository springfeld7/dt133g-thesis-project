# Config for: uv run build-identifier-map --config identifier-frequency-map.config.yaml
# You can keep values here and override any of them on the CLI when needed.

identifier_frequency_map:
  # Required (unless passed as CLI positional args)
  parquet_path: data/human-coded-general-purpose-python-java-cpp-samples.parquet
  output_json_path: output/identifier-frequency-map.json

  # Optional
  batch_size: 1000
  # Set to null to use min_coverage mode, or set an integer for fixed top-N mode
  top_n: null
  min_coverage: 0.95
