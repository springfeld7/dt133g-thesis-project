# External runtime configuration for TranStructIVer

execution:
  output_dir: output
  batch_size: 1000
  checkpoint_every: 1000
  resume: false
  max_rows_per_shard: 0
  compress_output: false

# Toggle and parameterize transformations
transformations:
  rename-identifier:
    enabled: true
    params:
      level: 0                              # Default: 0
      targets: [variable, parameter]        # Default: [variable, parameter]

  comment-deletion:
    enabled: false

  comment-normalization:
    enabled: false

  whitespace-normalization:
    enabled: false
    params:
      base_unit: 4                          # Default: 4

# Verifier thresholds and strictness
verifier:
  # strict | balanced | lenient
  strictness: strict

  # Optional hard override. If omitted, strictness defaults are used:
  # strict=0, balanced=3, lenient=10
  # max_errors: 0
